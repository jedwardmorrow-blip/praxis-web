<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 240" width="780" height="240" role="img" aria-label="PDS Heating and Cooling">
  <defs>
    <radialGradient id="pdsSun" cx="78" cy="92" r="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD23F"/>
      <stop offset="0.55" stop-color="#F7941E"/>
      <stop offset="1" stop-color="#ED1C24"/>
    </radialGradient>
    <linearGradient id="pdsSnow" x1="150" y1="50" x2="232" y2="134" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5BC8F5"/>
      <stop offset="1" stop-color="#2E3192"/>
    </linearGradient>
    <linearGradient id="pdsWord" x1="262" y1="0" x2="660" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F26522"/>
      <stop offset="0.22" stop-color="#ED1C24"/>
      <stop offset="0.55" stop-color="#92278F"/>
      <stop offset="0.80" stop-color="#2E3192"/>
      <stop offset="1" stop-color="#1B75BC"/>
    </linearGradient>
  </defs>

  <!-- SUN: rays radiating from a warm core -->
  <g transform="translate(78,92)">
    <g stroke="url(#pdsSun)" stroke-width="9" stroke-linecap="round">
      <g id="pdsRay"><line x1="0" y1="-40" x2="0" y2="-58"/></g>
      <use href="#pdsRay" transform="rotate(30)"/>
      <use href="#pdsRay" transform="rotate(60)"/>
      <use href="#pdsRay" transform="rotate(90)"/>
      <use href="#pdsRay" transform="rotate(120)"/>
      <use href="#pdsRay" transform="rotate(150)"/>
      <use href="#pdsRay" transform="rotate(180)"/>
      <use href="#pdsRay" transform="rotate(210)"/>
      <use href="#pdsRay" transform="rotate(240)"/>
      <use href="#pdsRay" transform="rotate(270)"/>
      <use href="#pdsRay" transform="rotate(300)"/>
      <use href="#pdsRay" transform="rotate(330)"/>
    </g>
    <circle cx="0" cy="0" r="31" fill="url(#pdsSun)"/>
  </g>

  <!-- SNOWFLAKE: six branched arms -->
  <g transform="translate(190,92)" stroke="url(#pdsSnow)" stroke-width="8" stroke-linecap="round" fill="none">
    <g id="pdsArm">
      <line x1="0" y1="0" x2="0" y2="-48"/>
      <line x1="0" y1="-31" x2="-14" y2="-44"/>
      <line x1="0" y1="-31" x2="14" y2="-44"/>
    </g>
    <use href="#pdsArm" transform="rotate(60)"/>
    <use href="#pdsArm" transform="rotate(120)"/>
    <use href="#pdsArm" transform="rotate(180)"/>
    <use href="#pdsArm" transform="rotate(240)"/>
    <use href="#pdsArm" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="6" fill="url(#pdsSnow)" stroke="none"/>
  </g>

  <!-- WORDMARK -->
  <text x="260" y="142" font-family="'Arial Black','Arial Narrow Bold',Arial,sans-serif" font-weight="900" font-size="156" letter-spacing="-6" fill="url(#pdsWord)">PDS</text>
  <text x="264" y="190" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="32" letter-spacing="7" fill="#2E3192">HEATING &amp; COOLING</text>
</svg>
