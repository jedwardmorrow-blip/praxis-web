<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="JMS Fencing">
  <!-- forged iron badge -->
  <rect x="2" y="2" width="116" height="116" rx="24" fill="#1b1815"/>
  <rect x="10" y="10" width="100" height="100" rx="16" fill="none" stroke="#5a554e" stroke-width="1.1"/>
  <rect x="13.5" y="13.5" width="93" height="93" rx="13" fill="none" stroke="#a8521f" stroke-opacity="0.4" stroke-width="0.8"/>

  <!-- ornamental iron picket crown -->
  <g stroke="#b35a24" stroke-linecap="round">
    <line x1="40" y1="34" x2="80" y2="34" stroke-width="2.4"/>
    <line x1="40" y1="47" x2="80" y2="47" stroke-width="2.4"/>
    <g stroke-width="2.3">
      <line x1="46" y1="34" x2="46" y2="47"/>
      <line x1="53" y1="34" x2="53" y2="47"/>
      <line x1="60" y1="34" x2="60" y2="47"/>
      <line x1="67" y1="34" x2="67" y2="47"/>
      <line x1="74" y1="34" x2="74" y2="47"/>
    </g>
  </g>
  <g fill="#b35a24">
    <path d="M42.8,34 L46,27.5 L49.2,34 Z"/>
    <path d="M49.8,34 L53,27.5 L56.2,34 Z"/>
    <path d="M56.8,34 L60,27.5 L63.2,34 Z"/>
    <path d="M63.8,34 L67,27.5 L70.2,34 Z"/>
    <path d="M70.8,34 L74,27.5 L77.2,34 Z"/>
  </g>

  <!-- JMS monogram, cut-steel geometry -->
  <g fill="none" stroke="#f4efe7" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M49,58 V80 Q49,85 43.5,85 Q38,85 38,79.5"/>
    <path d="M54,85 V59 L60.5,74 L67,59 V85"/>
    <path d="M84.5,62.5 Q84.5,57.5 78.2,57.5 Q72,57.5 72,63 Q72,68 78,69 Q84,70 84,76 Q84,81.5 77.8,81.5 Q72,81.5 72,76.5"/>
  </g>

  <!-- corten base rule -->
  <line x1="44" y1="94" x2="76" y2="94" stroke="#a8521f" stroke-width="2.4" stroke-linecap="round"/>
</svg>
