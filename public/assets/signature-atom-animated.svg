<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" width="56" height="56" role="img" aria-label="Praxis · the operating atom">
  <title>Praxis — Operational Intelligence</title>
  <defs>
    <clipPath id="innerField">
      <circle cx="180" cy="180" r="156"/>
    </clipPath>
    <radialGradient id="nucleusG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E84450"/>
      <stop offset="60%" stop-color="#C42130"/>
      <stop offset="100%" stop-color="#7a1422"/>
    </radialGradient>
  </defs>

  <!-- Static badge: cog teeth, gold ring, navy field -->
  <circle cx="180" cy="180" r="172" fill="#C9A24B"/>
  <g fill="#C9A24B">
    <g id="t"><rect x="174" y="0" width="12" height="14"/></g>
    <use href="#t" transform="rotate(30 180 180)"/>
    <use href="#t" transform="rotate(60 180 180)"/>
    <use href="#t" transform="rotate(90 180 180)"/>
    <use href="#t" transform="rotate(120 180 180)"/>
    <use href="#t" transform="rotate(150 180 180)"/>
    <use href="#t" transform="rotate(180 180 180)"/>
    <use href="#t" transform="rotate(210 180 180)"/>
    <use href="#t" transform="rotate(240 180 180)"/>
    <use href="#t" transform="rotate(270 180 180)"/>
    <use href="#t" transform="rotate(300 180 180)"/>
    <use href="#t" transform="rotate(330 180 180)"/>
  </g>
  <circle cx="180" cy="180" r="158" fill="#0a2545" stroke="#F1E8D2" stroke-width="3"/>

  <!-- Animated content clipped to inner navy field -->
  <g clip-path="url(#innerField)">

    <!-- Orbit 03 (outermost, slowest) -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 180 180" to="360 180 180" dur="32s" repeatCount="indefinite"/>
      <ellipse cx="180" cy="180" rx="128" ry="46" fill="none" stroke="#C9A24B" stroke-width="0.8" stroke-dasharray="2,3" opacity="0.42"/>
      <circle cx="308" cy="180" r="5" fill="#C9A24B" opacity="0.85"/>
      <circle cx="52" cy="180" r="4" fill="#C9A24B" opacity="0.6"/>
      <circle cx="180" cy="226" r="3.5" fill="#C9A24B" opacity="0.7"/>
    </g>

    <!-- Orbit 02 (middle, reverse direction) -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 180 180" to="-360 180 180" dur="20s" repeatCount="indefinite"/>
      <ellipse cx="180" cy="180" rx="92" ry="92" fill="none" stroke="#C9A24B" stroke-width="0.9" stroke-dasharray="3,3" opacity="0.55"/>
      <circle cx="272" cy="180" r="7" fill="#F1E8D2"/>
      <circle cx="88" cy="180" r="5" fill="#C9A24B"/>
    </g>

    <!-- Orbit 01 (innermost, fastest) -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 180 180" to="360 180 180" dur="13s" repeatCount="indefinite"/>
      <ellipse cx="180" cy="180" rx="62" ry="22" fill="none" stroke="#C9A24B" stroke-width="0.7" stroke-dasharray="1.5,2" opacity="0.55"/>
      <circle cx="242" cy="180" r="5" fill="#F1E8D2"/>
    </g>

    <!-- Outer pulse halo -->
    <circle cx="180" cy="180" r="56" fill="#C42130" opacity="0.18">
      <animate attributeName="r" values="56;66;56" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.18;0.04;0.18" dur="3.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Pulsing nucleus -->
    <circle cx="180" cy="180" r="44" fill="url(#nucleusG)">
      <animate attributeName="r" values="44;48;44" dur="3.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Specular highlight on nucleus -->
    <circle cx="170" cy="170" r="10" fill="#F1E8D2" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.55;0.35" dur="3.2s" repeatCount="indefinite"/>
    </circle>

  </g>
</svg>
