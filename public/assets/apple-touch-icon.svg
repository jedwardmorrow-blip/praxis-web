<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="Praxis">
  <title>Praxis — Apple Touch Icon</title>
  <!-- Apple touch icons sit on iOS home screen and prefer some padding around the mark -->
  <rect width="180" height="180" fill="#0a2545"/>
  <g transform="translate(90, 90) scale(0.42) translate(-180, -180)">
    <circle cx="180" cy="180" r="172" fill="#C9A24B"/>
    <g fill="#C9A24B">
      <g id="t"><rect x="174" y="0" width="12" height="14"/></g>
      <use href="#t" transform="rotate(30 180 180)"/>
      <use href="#t" transform="rotate(60 180 180)"/>
      <use href="#t" transform="rotate(90 180 180)"/>
      <use href="#t" transform="rotate(120 180 180)"/>
      <use href="#t" transform="rotate(150 180 180)"/>
      <use href="#t" transform="rotate(180 180 180)"/>
      <use href="#t" transform="rotate(210 180 180)"/>
      <use href="#t" transform="rotate(240 180 180)"/>
      <use href="#t" transform="rotate(270 180 180)"/>
      <use href="#t" transform="rotate(300 180 180)"/>
      <use href="#t" transform="rotate(330 180 180)"/>
    </g>
    <circle cx="180" cy="180" r="158" fill="#0a2545" stroke="#F1E8D2" stroke-width="3"/>
    <circle cx="180" cy="180" r="50" fill="#C42130"/>
  </g>
</svg>
